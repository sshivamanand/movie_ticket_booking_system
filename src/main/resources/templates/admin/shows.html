<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2>Add Show</h2>
        <form th:action="@{/admin/shows}" method="post">
            <div class="form-group">
                <label>Movie</label>
                <select name="movieId" required>
                    <option th:each="m : ${movies}" th:value="${m.movieId}" th:text="${m.title}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Screen</label>
                <select name="screenId" required>
                    <option th:each="s : ${screens}" th:value="${s.screenId}" th:text="'Screen ' + ${s.screenNumber} + ' @ ' + ${s.theatre.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Show Time (yyyy-MM-ddTHH:mm)</label>
                <input type="datetime-local" name="showTime" required step="60">
            </div>
            <div class="form-group">
                <label>Price (Rs)</label>
                <input type="number" name="price" min="0" step="0.01" required>
            </div>
            <button type="submit" class="btn">Add Show</button>
        </form>
    </div>
    <div class="card">
        <h3>Shows</h3>
        <table th:if="${!shows.isEmpty()}">
            <thead><tr><th>ID</th><th>Movie</th><th>Screen</th><th>Time</th><th>Price</th></tr></thead>
            <tbody>
                <tr th:each="s : ${shows}">
                    <td th:text="${s.showId}"></td>
                    <td th:text="${s.movie.title}"></td>
                    <td th:text="${s.screen.theatre.name + ' - Screen ' + s.screen.screenNumber}"></td>
                    <td th:text="${#temporals.format(s.showTime, 'dd-MMM HH:mm')}"></td>
                    <td th:text="'Rs. ' + ${s.price}"></td>
                </tr>
            </tbody>
        </table>
        <p th:if="${shows.isEmpty()}">No shows yet.</p>
    </div>
</th:block>
</body>
</html>
