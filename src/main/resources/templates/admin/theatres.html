<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="card">
        <h2>Add Theatre</h2>
        <form th:action="@{/admin/theatres}" method="post">
            <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Location</label><input type="text" name="location" required></div>
            <button type="submit" class="btn">Add Theatre</button>
        </form>
    </div>
    <div class="card">
        <h3>Theatres</h3>
        <table th:if="${!theatres.isEmpty()}">
            <thead><tr><th>ID</th><th>Name</th><th>Location</th><th>Screens</th><th>Add Screen</th></tr></thead>
            <tbody>
                <tr th:each="t : ${theatres}">
                    <td th:text="${t.theatreId}"></td>
                    <td th:text="${t.name}"></td>
                    <td th:text="${t.location}"></td>
                    <td th:text="${t.screens.size()}"></td>
                    <td>
                        <form th:action="@{/admin/theatres/{id}/screens(id=${t.theatreId})}" method="post" style="display:inline;">
                            <input type="number" name="screenNumber" placeholder="Screen#" min="1" style="width:70px;">
                            <input type="number" name="totalSeats" placeholder="Seats" min="1" style="width:70px;">
                            <button type="submit" class="btn btn-secondary">Add</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p th:if="${theatres.isEmpty()}">No theatres yet.</p>
    </div>
</th:block>
</body>
</html>
